services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexusauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusauth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexusauth?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000,http://localhost:4000
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_ISSUER: nexusauth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - keys_data:/app/keys
    networks:
      - nexus-net

  test-app:
    build:
      context: ./docker/test-app
      dockerfile: Dockerfile
    container_name: nexus-test-app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      API_URL: http://api:3000
    depends_on:
      - api
    networks:
      - nexus-net

volumes:
  postgres_data:
  redis_data:
  keys_data:

networks:
  nexus-net:
    driver: bridge
