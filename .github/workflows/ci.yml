name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexusauth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://nexus:nexus@localhost:5432/nexusauth"
      REDIS_URL: "redis://localhost:6379"
      JWT_PRIVATE_KEY_PATH: "./keys/private.pem"
      JWT_PUBLIC_KEY_PATH: "./keys/public.pem"
      NODE_ENV: "test"
      PORT: "3000"
      CORS_ORIGINS: "http://localhost:4000"
      GOOGLE_CLIENT_ID: "test"
      GOOGLE_CLIENT_SECRET: "test"
      GOOGLE_CALLBACK_URL: "http://localhost:3000/auth/google/callback"
      GITHUB_CLIENT_ID: "test"
      GITHUB_CLIENT_SECRET: "test"
      GITHUB_CALLBACK_URL: "http://localhost:3000/auth/github/callback"
      SMTP_HOST: "localhost"
      SMTP_PORT: "587"
      SMTP_USER: "test"
      SMTP_PASS: "test"
      SMTP_FROM: "test@test.com"
      REQUIRE_EMAIL_VERIFIED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate RS256 keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem

      - name: Prisma generate
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx jest --config test/jest-e2e.config.ts --forceExit --verbose

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t nexusauth:latest .

      - name: Build test image
        run: docker build -f Dockerfile.test -t nexusauth-test-runner:latest .
